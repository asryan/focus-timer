<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Timer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --work:   #ef4444;
      --short:  #22c55e;
      --long:   #a855f7;
      --bg:     #0f0f0f;
      --surface:#1a1a1a;
      --text:   #f5f5f5;
      --muted:  #666;
      --accent: var(--work);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
      padding: 2rem;
    }

    h1 { font-size: 1.1rem; color: var(--muted); letter-spacing: .2em; text-transform: uppercase; }

    .phase-label {
      font-size: 1rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--accent);
      transition: color .4s;
      min-height: 1.4em;
    }

    .ring-wrap {
      position: relative;
      width: 260px;
      height: 260px;
    }

    svg.ring {
      transform: rotate(-90deg);
      width: 260px;
      height: 260px;
    }

    .ring-bg   { fill: none; stroke: #222; stroke-width: 12; }
    .ring-fill {
      fill: none;
      stroke: var(--accent);
      stroke-width: 12;
      stroke-linecap: round;
      stroke-dasharray: 720;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset .5s linear, stroke .4s;
      filter: drop-shadow(0 0 6px var(--accent));
    }

    .time-display {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .3rem;
    }

    .time {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: .05em;
      line-height: 1;
    }

    .pct { font-size: .85rem; color: var(--muted); }

    .controls { display: flex; gap: 1rem; }

    button {
      background: var(--surface);
      border: 1px solid #333;
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      letter-spacing: .08em;
      padding: .65rem 1.6rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }

    button:hover  { background: #252525; border-color: #555; }
    button:active { background: #303030; }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 700;
      transition: background .4s, border-color .4s;
    }
    button.primary:hover  { filter: brightness(1.15); }

    .stats {
      display: flex;
      gap: 2rem;
      font-size: .8rem;
      color: var(--muted);
    }

    .stat span { color: var(--text); font-weight: 600; }

    .dots {
      display: flex;
      gap: .5rem;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #333;
      transition: background .3s;
    }
    .dot.done { background: var(--work); }
    .dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

    .log {
      width: 100%;
      max-width: 340px;
      max-height: 120px;
      overflow-y: auto;
      font-size: .75rem;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: .2rem;
    }
    .log-entry { display: flex; justify-content: space-between; }
    .log-entry .tag { color: var(--text); }
  </style>
</head>
<body>

<h1>🍅 Focus Timer</h1>

<div class="phase-label" id="phaseLabel">Ready</div>

<div class="ring-wrap">
  <svg class="ring" viewBox="0 0 260 260">
    <circle class="ring-bg"   cx="130" cy="130" r="114" />
    <circle class="ring-fill" cx="130" cy="130" r="114" id="ringFill" />
  </svg>
  <div class="time-display">
    <div class="time" id="timeDisplay">25:00</div>
    <div class="pct"  id="pctDisplay">0%</div>
  </div>
</div>

<div class="dots" id="dots"></div>

<div class="controls">
  <button class="primary" id="startBtn" onclick="toggle()">Start</button>
  <button onclick="skipPhase()">Skip</button>
  <button onclick="resetAll()">Reset</button>
</div>

<div class="stats">
  <div>Today <span id="statToday">0</span></div>
  <div>All time <span id="statTotal">0</span></div>
</div>

<div class="log" id="log"></div>

<script>
const PHASES = [
  { name: "Work",        mins: 25, color: "var(--work)"  },
  { name: "Short Break", mins: 5,  color: "var(--short)" },
];
const LONG_BREAK = { name: "Long Break", mins: 15, color: "var(--long)" };
const SESSIONS_BEFORE_LONG = 4;
const CIRCUMFERENCE = 2 * Math.PI * 114; // ~716

const ringFill  = document.getElementById("ringFill");
const timeDisp  = document.getElementById("timeDisplay");
const pctDisp   = document.getElementById("pctDisplay");
const phaseLabel= document.getElementById("phaseLabel");
const startBtn  = document.getElementById("startBtn");
const dotsEl    = document.getElementById("dots");
const logEl     = document.getElementById("log");

ringFill.style.strokeDasharray  = CIRCUMFERENCE;
ringFill.style.strokeDashoffset = CIRCUMFERENCE;

let state = loadState();
let timer = null;
let running = false;
let phaseIndex = 0;   // 0=work 1=break (or long break)
let workCount = 0;    // work sessions completed this cycle
let elapsed = 0;
let totalSecs = 0;
let currentPhase = PHASES[0];

function loadState() {
  const today = new Date().toISOString().slice(0,10);
  try {
    const s = JSON.parse(localStorage.getItem("focusTimer") || "{}");
    if (s.date !== today) { s.today = 0; s.date = today; }
    return { today: s.today||0, total: s.total||0, date: today, log: s.log||[] };
  } catch { return { today:0, total:0, date: today, log:[] }; }
}

function saveState() {
  localStorage.setItem("focusTimer", JSON.stringify(state));
}

function setAccent(color) {
  document.documentElement.style.setProperty("--accent", color);
}

function renderDots() {
  dotsEl.innerHTML = "";
  for (let i = 0; i < SESSIONS_BEFORE_LONG; i++) {
    const d = document.createElement("div");
    d.className = "dot" +
      (i < workCount ? " done" : "") +
      (i === workCount && running && currentPhase.name === "Work" ? " active" : "");
    dotsEl.appendChild(d);
  }
}

function renderStats() {
  document.getElementById("statToday").textContent = state.today;
  document.getElementById("statTotal").textContent = state.total;
}

function renderLog() {
  logEl.innerHTML = "";
  [...state.log].reverse().slice(0,10).forEach(e => {
    const row = document.createElement("div");
    row.className = "log-entry";
    row.innerHTML = `<span class="tag">${e.phase}</span><span>${e.time}</span>`;
    logEl.appendChild(row);
  });
}

function setPhase(phase) {
  currentPhase = phase;
  totalSecs = phase.mins * 60;
  elapsed = 0;
  setAccent(phase.color);
  phaseLabel.textContent = phase.name;
  updateDisplay();
  renderDots();
}

function updateDisplay() {
  const remaining = Math.max(0, totalSecs - elapsed);
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  timeDisp.textContent = `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  const pct = totalSecs > 0 ? elapsed / totalSecs : 0;
  pctDisp.textContent = `${Math.floor(pct * 100)}%`;
  ringFill.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
}

function tick() {
  elapsed++;
  updateDisplay();
  if (elapsed >= totalSecs) {
    completePhase();
  }
}

function completePhase() {
  clearInterval(timer);
  running = false;
  startBtn.textContent = "Start";
  notify(currentPhase.name + " complete!");

  const now = new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  if (currentPhase.name === "Work") {
    state.today++;
    state.total++;
    workCount++;
    state.log.push({ phase: "✅ Work", time: now });
    saveState();
    renderStats();

    const next = workCount >= SESSIONS_BEFORE_LONG ? LONG_BREAK : PHASES[1];
    if (workCount >= SESSIONS_BEFORE_LONG) workCount = 0;
    setPhase(next);
    phaseLabel.textContent = next.name + " — press Start";
  } else {
    state.log.push({ phase: currentPhase.name === "Long Break" ? "🟣 Long Break" : "🟢 Break", time: now });
    saveState();
    setPhase(PHASES[0]);
    phaseLabel.textContent = "Work — press Start";
  }
  renderLog();
  renderDots();
}

function toggle() {
  if (running) {
    clearInterval(timer);
    running = false;
    startBtn.textContent = "Resume";
    phaseLabel.textContent = currentPhase.name + " — paused";
  } else {
    if (elapsed === 0 && totalSecs === 0) setPhase(PHASES[0]);
    running = true;
    startBtn.textContent = "Pause";
    phaseLabel.textContent = currentPhase.name;
    timer = setInterval(tick, 1000);
  }
  renderDots();
}

function skipPhase() {
  clearInterval(timer);
  running = false;
  startBtn.textContent = "Start";
  elapsed = totalSecs;
  completePhase();
}

function resetAll() {
  clearInterval(timer);
  running = false;
  workCount = 0;
  startBtn.textContent = "Start";
  setPhase(PHASES[0]);
  phaseLabel.textContent = "Ready";
}

function notify(msg) {
  if (Notification.permission === "granted") {
    new Notification("🍅 Focus Timer", { body: msg, icon: "" });
  }
  // play a soft beep
  try {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = "sine"; osc.frequency.value = 660;
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
    osc.start(); osc.stop(ctx.currentTime + 0.8);
  } catch {}
}

if (Notification.permission === "default") Notification.requestPermission();

// init
setPhase(PHASES[0]);
renderStats();
renderLog();
</script>
</body>
</html>
